<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ПТО — ЭнергоАтлант</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="grid-bg">
<div id="preloader"><img src="/img/logo.png" alt="ЭнергоАтлант" class="preloader-logo"></div>
<div class="dash-layout">

  <!-- САЙДБАР -->
  <aside class="sidebar">
    <div class="sidebar-logo"><img src="/img/logo.png" alt="ЭнергоАтлант" style="width:140px;height:auto"></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-section="projects">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Проекты
      </button>
      <button class="nav-item" data-section="documents">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Документы
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <strong id="user-name">—</strong>
        <span>ПТО</span>
      </div>
      <button class="btn btn-outline btn-sm w-full" id="logout-btn">Выйти</button>
    </div>
  </aside>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <main class="dash-main">

    <!-- ПРОЕКТЫ -->
    <div class="dash-section active" id="section-projects">
      <div class="dash-header flex-between">
        <h1>Мои проекты</h1>
        <button class="btn btn-outline btn-sm" id="btn-join-project">+ Войти по коду</button>
      </div>
      <div id="projects-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem"></div>
    </div>

    <!-- ДОКУМЕНТЫ -->
    <div class="dash-section" id="section-documents">
      <div class="dash-header flex-between">
        <h1>Исполнительная документация</h1>
        <select class="form-control" id="docs-project-select" style="font-size:.85rem;padding:.4rem .75rem;max-width:260px">
          <option value="">— выберите проект —</option>
        </select>
      </div>

      <!-- Загрузка ИД -->
      <div class="card" style="margin-bottom:1.5rem" id="upload-section" style="display:none">
        <div class="card-title">Загрузить документ</div>
        <form id="upload-doc-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
            <div class="form-group" style="margin:0">
              <label class="form-label">Тип документа</label>
              <select class="form-control" name="doc_type" id="doc-type-select" required>
                <option value="">— выберите —</option>
              </select>
            </div>
            <div class="form-group" style="margin:0">
              <label class="form-label">Файл (PDF, Word, Excel, фото)</label>
              <input type="file" class="form-control" name="file" id="doc-file-input"
                accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.webp" required
                style="padding:.4rem .6rem;font-size:.85rem">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:.75rem">
            <input type="text" class="form-control" name="description" placeholder="Описание (необязательно)" style="font-size:.85rem">
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Загрузить</button>
        </form>
      </div>

      <!-- Список документов -->
      <div class="card" id="docs-list-card">
        <div id="docs-list" style="color:var(--muted);font-size:.9rem">Выберите проект</div>
      </div>
    </div>

  </main>
</div>

<!-- МОДАЛКА: войти по коду -->
<div class="modal-overlay" id="modal-join">
  <div class="modal">
    <button class="modal-close" data-close="modal-join">×</button>
    <div class="modal-title">Войти в проект</div>
    <form id="join-form">
      <div class="form-group">
        <label class="form-label">Код проекта</label>
        <input type="text" class="form-control" name="code" placeholder="PRJ-2026-XXXX" required style="text-transform:uppercase">
      </div>
      <button type="submit" class="btn btn-primary w-full mt-2">Присоединиться</button>
    </form>
  </div>
</div>

<!-- МОДАЛКА: проект (этапы + документы) -->
<div class="modal-overlay" id="modal-project">
  <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto">
    <button class="modal-close" data-close="modal-project">×</button>
    <div class="modal-title" id="modal-project-title">Проект</div>
    <div id="modal-project-meta" class="mb-3" style="color:var(--muted);font-size:.9rem"></div>

    <!-- Вкладки -->
    <div style="display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:.75rem">
      <button class="btn btn-sm btn-primary" id="pto-tab-btn-stages" data-ptotab="stages">Этапы</button>
      <button class="btn btn-sm btn-outline"  id="pto-tab-btn-docs"   data-ptotab="docs">Документы</button>
    </div>

    <!-- Этапы -->
    <div id="pto-tab-stages">
      <div style="font-weight:600;font-size:.9rem;margin-bottom:.75rem">Этапы работ</div>
      <div id="modal-stages-list" class="stage-list"></div>
    </div>

    <!-- Документы -->
    <div id="pto-tab-docs" style="display:none">
      <div id="pto-modal-docs-list"><span style="color:var(--muted)">Загрузка...</span></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/preloader.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/pto.js"></script>
</body>
</html>
